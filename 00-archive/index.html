<script>
    window.$docsify = {
        name: 'Nick‘s Blog',
        logo: '/attachment/images/icon.svg',
        repo: '',
        loadSidebar:true, //开启侧边栏
        // hideSidebar: true,
        alias: { //防止侧边栏目录从顶部目录落入到内部目录
            '/.*/_sidebar.md': '/_sidebar.md'
        },
        themeColor: "#42b983",
        autoHeader: true,
        relativePath: true,
        subMaxLevel: 3, //侧边栏解析md文件中header最大层级,
        routerMode: 'history',
        coverpage: true,
        maxLevel: 4,
        // themeColor: '#3F51B5',
        // loadNavbar: true, // 开启导航
        search:{ //搜索配置
            placeholder:"搜索",
            noData:"没有数据",
            depth: 10,
            paths:"auto"
        },
        darkMode: {
            dark: {
                background: "#1c2022",
                toggleBtnBg: "#b4b4b4",
                textColor: "#b4b4b4"
            },
            light: {
                background: "white",
                toggleBtnBg: "var(--theme-color)",
                textColor: "var(--theme-color)"
            }
        },
        timeUpdater: {
            text: "<div align='center' width='200px' style='color:gray;font-size:10px'>-------------- 最后更新时间:&emsp;{docsify-updated} --------------</div>",
            formatUpdated: "{YYYY}/{MM}/{DD}",
            whereToPlace: "bottom",  // "top" or "bottom", default to "bottom"
        },
        count:{ //数字统计
            countable: true,
            position: 'top',
            margin: '10px',
            float: 'right',
            fontsize:'0.9em',
            color:'rgb(90,90,90)',
            language:'chinese',
            localization: {
                words: "",
                minute: ""
            },
            isExpected: true
        }
    }
</script>
